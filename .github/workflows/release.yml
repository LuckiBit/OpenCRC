name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: opencrc-linux
            archive_name: opencrc-linux.tar.gz
            cmake_flags: "-DCMAKE_EXE_LINKER_FLAGS=-static"
          - os: macos-latest
            artifact_name: opencrc-macos
            archive_name: opencrc-macos.tar.gz
            cmake_flags: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir staging
          cp build/bin/crc staging/crc
          chmod +x staging/crc
          tar -czvf ${{ matrix.archive_name }} -C staging crc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: opencrc-linux

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: opencrc-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            opencrc-linux.tar.gz
            opencrc-macos.tar.gz
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
